<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>工业 AI 智能体决策平台</title>
    <style>
      :root { font-family: "Segoe UI", Arial, sans-serif; }
      body { margin: 0; background: #f2f4f8; color: #1f2937; }
      .wrap { width: min(1100px, 94vw); margin: 24px auto; }
      h1 { margin-bottom: 8px; }
      .muted { color: #64748b; }
      .grid { display: grid; gap: 16px; grid-template-columns: repeat(3, 1fr); }
      .card { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08); }
      table { width: 100%; border-collapse: collapse; font-size: 14px; }
      th, td { border-bottom: 1px solid #e5e7eb; padding: 8px; text-align: left; }
      .ai { margin-top: 18px; }
      textarea { width: 100%; min-height: 80px; border: 1px solid #cbd5e1; border-radius: 8px; padding: 10px; }
      button { margin-top: 8px; border: none; background: #1d4ed8; color: #fff; border-radius: 8px; padding: 10px 14px; cursor: pointer; }
      pre { background: #0f172a; color: #e2e8f0; padding: 12px; border-radius: 8px; white-space: pre-wrap; }
      @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>工业 AI 智能体决策平台</h1>
      <p class="muted">接入本地大模型 + SQLite，实现订单、生产排期、仓库物料的可视化管理与智能决策建议。</p>

      <section class="grid">
        <article class="card">
          <h3>订单中心</h3>
          <table id="ordersTable"></table>
        </article>
        <article class="card">
          <h3>生产排期</h3>
          <table id="scheduleTable"></table>
        </article>
        <article class="card">
          <h3>仓库物料</h3>
          <table id="materialsTable"></table>
        </article>
      </section>

      <section class="card ai">
        <h3>AI 决策助手（本地模型）</h3>
        <textarea id="question" placeholder="例如：请给出未来 7 天保交付的排产和补货建议"></textarea>
        <br />
        <button id="askBtn">生成建议</button>
        <pre id="answer">等待提问...</pre>
      </section>
    </main>

    <script>
      function renderTable(el, columns, rows) {
        const thead = `<tr>${columns.map(c => `<th>${c.label}</th>`).join("")}</tr>`;
        const tbody = rows.map(row => `<tr>${columns.map(c => `<td>${row[c.key]}</td>`).join("")}</tr>`).join("");
        el.innerHTML = thead + tbody;
      }

      async function loadOverview() {
        const resp = await fetch('/api/overview');
        const data = await resp.json();

        renderTable(document.getElementById('ordersTable'), [
          {key:'customer', label:'客户'}, {key:'product', label:'产品'}, {key:'quantity', label:'数量'}, {key:'due_date', label:'交期'}, {key:'priority', label:'优先级'}
        ], data.orders);

        renderTable(document.getElementById('scheduleTable'), [
          {key:'production_line', label:'产线'}, {key:'product', label:'产品'}, {key:'start_date', label:'开始'}, {key:'end_date', label:'结束'}, {key:'progress', label:'进度%'}
        ], data.schedule);

        renderTable(document.getElementById('materialsTable'), [
          {key:'material_name', label:'物料'}, {key:'stock_qty', label:'库存'}, {key:'reorder_level', label:'补货阈值'}, {key:'supplier', label:'供应商'}
        ], data.materials);
      }

      document.getElementById('askBtn').addEventListener('click', async () => {
        const question = document.getElementById('question').value.trim();
        const answerEl = document.getElementById('answer');
        answerEl.textContent = 'AI 正在分析...';

        const resp = await fetch('/api/ai/decision', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({question})
        });
        const data = await resp.json();
        answerEl.textContent = `问题: ${data.question}\n\n上下文: ${JSON.stringify(data.context, null, 2)}\n\n建议:\n${data.answer}`;
      });

      loadOverview();
    </script>
  </body>
</html>
